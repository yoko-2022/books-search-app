services:
  # ① PostgreSQLデータベース
  db:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data  # データをコンテナ外に保存
    ports:
      - "5432:5432"

  # ② FastAPIバックエンド
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # ホットリロード用
      - /app/venv
    depends_on:
      - db
    restart: always

  # ③ Next.jsフロントエンド
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000  # バックエンドのURL
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app  # ホットリロード用
      - /app/node_modules
    depends_on:
      - backend  # バックエンドが起動してから起動
    restart: always

volumes:
  postgres_data:  # DBデータの永続化